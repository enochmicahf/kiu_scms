services:
  # Database Service
  db:
    image: mysql:8.0
    container_name: scms-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-kiudbpass!23}
      MYSQL_DATABASE: ${DB_NAME:-scms_db}
      MYSQL_USER: ${DB_USER:-kiu_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kiupass!123}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scms-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scms-backend
    restart: always
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-scms_db}
      DB_USER: ${DB_USER:-kiu_user}
      DB_PASSWORD: ${DB_PASSWORD:-kiupass!123}
      JWT_SECRET: ${JWT_SECRET:-PROD_SECURE_TOKEN_REPLACE_ME}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - scms-network

  # Frontend Service (Nginx Proxy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scms-frontend
    restart: always
    ports:
      - "8086:80"
    depends_on:
      - backend
    networks:
      - scms-network

  # Database Management (Optional, can be commented out for maximum security)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: scms-pma
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-kiudbpass!23}
    ports:
      - "8087:80"
    depends_on:
      - db
    networks:
      - scms-network

volumes:
  db_data:

networks:
  scms-network:
    driver: bridge
