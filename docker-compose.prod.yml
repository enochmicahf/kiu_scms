version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: scms-db-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-kiudbpass!23}
      MYSQL_DATABASE: ${DB_NAME:-scms_db}
      MYSQL_USER: ${DB_USER:-kiu_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kiupass!123}
    ports:
      - "3306:3306"
    volumes:
      - db_data_prod:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - scms_prod_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: scms-phpmyadmin-prod
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-kiudbpass!23}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - scms_prod_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scms-backend-prod
    restart: always
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-scms_db}
      DB_USER: ${DB_USER:-kiu_user}
      DB_PASSWORD: ${DB_PASSWORD:-kiupass!123}
      JWT_SECRET: ${JWT_SECRET:-PROD_SECURE_TOKEN_REPLACE_ME}
    depends_on:
      - db
    networks:
      - scms_prod_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scms-frontend-prod
    restart: always
    ports:
      - "8086:80"
    depends_on:
      - backend
    networks:
      - scms_prod_network

volumes:
  db_data_prod:

networks:
  scms_prod_network:
    driver: bridge
